services:

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env                          # never baked into image; loaded at runtime only
    environment:
      QDRANT_HOST: qdrant             # override localhost → docker service name
      HF_HOME: /app/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/sentence_transformers
    depends_on:
      - qdrant
    volumes:
      - uploads:/app/uploads          # uploaded documents
      - sqlite_data:/app              # conversations.db
      - hf_cache:/app/.cache          # HuggingFace / sentence-transformers model cache

volumes:
  qdrant_data:
  uploads:
  sqlite_data:
  hf_cache:
